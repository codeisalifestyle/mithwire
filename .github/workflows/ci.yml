name: CI

# The engine had no automated gate before this: every change reached PyPI
# validated only by whatever ran on a maintainer's laptop. This restores the
# floor -- the engine's own pytest suite runs on every push to main and every
# PR, on a clean checkout with locked-from-pyproject dependencies.
#
# Every engine test in this lane is Chrome-free by design: the connect-retry
# regression stubs asyncio.create_subprocess_exec and the CDP attach/update
# calls, and the stealth-diagnostic tests cover only the no-browser surface
# (grading logic on synthetic probe payloads, plus public-API exports and CLI
# argparse wiring). The diagnostic's browser-driving runner is intentionally
# NOT exercised here. If/when Chrome-dependent tests are added, mirror the
# setup-chrome + AppArmor steps from mithwire-mcp's CI here and tag those tests
# so this fast lane stays Chrome-free.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests (no Chrome)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Install Python + dependencies
        run: uv sync --group dev
      - name: Run tests
        run: uv run pytest -v
